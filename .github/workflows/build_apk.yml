name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK
        working-directory: mobile
        run: |
          flutter build apk --release --dart-define=API_BASE_URL=https://runna-backend.onrender.com/api

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: runna-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
